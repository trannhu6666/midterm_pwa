<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Task Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bs-primary: #e83e8c;
            --bs-primary-rgb: 232, 62, 140;
        }

        body {
            background-color: #f4f7f6;
        }

        .task-card {
            max-width: 600px;
            margin: 2rem auto;
            border-radius: 15px;
        }

        .list-group-item {
            transition: all 0.2s ease-in-out;
        }

        .list-group-item:hover {
            transform: translateX(5px);
        }

        /* Ghi đè màu nút và viền sang hồng */
        .btn-primary {
            background-color: var(--bs-primary) !important;
            border-color: var(--bs-primary) !important;
        }

        .btn-primary:hover {
            background-color: #d63384 !important;
        }

        .text-primary {
            color: var(--bs-primary) !important;
        }

        .border-primary {
            border-color: var(--bs-primary) !important;
        }

        .form-check-input:checked {
            background-color: var(--bs-primary);
            border-color: var(--bs-primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card shadow-sm task-card border-0">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4 fw-bold">
                    <i class="bi bi-check2-square text-primary me-2"></i>My Tasks
                </h3>

                <div id="offline-badge" class="alert alert-warning d-none py-2 text-center small fw-semibold mb-3">
                    <i class="bi bi-wifi-off me-1"></i> You are offline. Tasks are saved locally.
                </div>

                <div class="input-group mb-4 shadow-sm rounded">
                    <input type="text" id="taskInput"
                        class="form-control form-control-lg border-primary border-opacity-25"
                        placeholder="What needs to be done?">
                    <button class="btn btn-primary px-4" type="button" id="addTaskBtn">
                        <i class="bi bi-plus-lg fw-bold"></i>
                    </button>
                </div>

                <ul class="list-group list-group-flush" id="taskList">
                </ul>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
